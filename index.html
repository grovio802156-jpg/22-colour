<!DOCTYPE html>
<html>
<head>
<title>22 Colour</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#111;
color:white;
text-align:center;
}

header{
background:#222;
padding:10px;
}

.wallet{
background:#333;
margin:20px;
padding:20px;
border-radius:10px;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:5px;
background:orange;
color:white;
}

input{
padding:10px;
margin:5px;
border-radius:5px;
border:none;
}

.games{
display:flex;
justify-content:center;
gap:10px;
}

.game{
background:#444;
padding:15px;
border-radius:10px;
}

footer{
position:fixed;
bottom:0;
width:100%;
background:#222;
padding:10px;
}

footer button{
background:none;
color:white;
}

</style>

</head>

<body>

<header>
<h2>22 COLOUR</h2>
</header>

<div id="loginPage">

<h3>Signup</h3>

<input id="mobile" placeholder="Mobile number"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="signup()">Signup</button>

<h3>Login</h3>

<input id="lmobile" placeholder="Mobile number"><br>
<input id="lpassword" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

</div>

<div id="app" style="display:none">

<div class="wallet">

<h3>Total Balance</h3>
<h1 id="balance">₹0</h1>

<button onclick="deposit()">Deposit</button>
<button onclick="withdraw()">Withdraw</button>

</div>

<h3>Games</h3>

<div class="games">

<div class="game">🎮 22 Colour</div>
<div class="game">💣 Mines</div>
<div class="game">✈️ Aviator</div>

</div>

<h3>Referral ID</h3>

<p id="refid"></p>

<button onclick="logout()">Logout</button>

</div>

<script>

let balance = 0

function signup(){
let m=document.getElementById("mobile").value
let p=document.getElementById("password").value
localStorage.setItem("mobile",m)
localStorage.setItem("pass",p)
alert("Signup Successful")
}

function login(){
let m=document.getElementById("lmobile").value
let p=document.getElementById("lpassword").value

if(m==localStorage.getItem("mobile") && p==localStorage.getItem("pass")){
document.getElementById("loginPage").style.display="none"
document.getElementById("app").style.display="block"
document.getElementById("refid").innerText="REF"+Math.floor(Math.random()*999999)
}else{
alert("Wrong Login")
}
}

function deposit(){
balance+=100
document.getElementById("balance").innerText="₹"+balance
}

function withdraw(){
if(balance>=100){
balance-=100
document.getElementById("balance").innerText="₹"+balance
}else{
alert("Low Balance")
}
}

function logout(){
location.reload()
}

</script>

</body>
</html>
</div>

</body>
</html>
