<!DOCTYPE html>
<html>
<head>
<title>Wallet App</title>
</head>

<body>

<h2>Signup</h2>

<input id="mobile" placeholder="Mobile number">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">
Signup
</button>

<hr>

<h2>Login</h2>

<input id="loginMobile" placeholder="Mobile number">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">
Login
</button>

<h3 id="result"></h3>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getFirestore, collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDeWkiOnXncuckXQOs5gZkWRrHBGxG2WdY",
  authDomain: "my-wallet-app-509be.firebaseapp.com",
  projectId: "my-wallet-app-509be",
  storageBucket: "my-wallet-app-509be.firebasestorage.app",
  messagingSenderId: "300531016687",
  appId: "1:300531016687:web:55bdfe5608d87f7debcc1a",
  measurementId: "G-HYFJVSFYZP"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Signup function
window.signup = async function(){

let mobile = document.getElementById("mobile").value
let pass = document.getElementById("password").value

await addDoc(collection(db,"users"),{

mobile: mobile,
password: pass,
balance: 0

})

alert("Signup Success")

}

// Login function
window.login = async function(){

let mobile = document.getElementById("loginMobile").value
let pass = document.getElementById("loginPass").value

const querySnapshot = await getDocs(collection(db,"users"))

querySnapshot.forEach((doc)=>{

let data = doc.data()

if(data.mobile==mobile && data.password==pass){

document.getElementById("result").innerText =
"Login success | Wallet balance: "+data.balance

}

})

}

</script>

</body>
</html></html>🎁
