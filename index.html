<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mobile App Builder</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.container{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
flex-wrap:wrap;
}

.panel{
background:#222;
padding:10px;
border-radius:6px;
width:140px;
}

.panel button{
width:100%;
margin:5px 0;
padding:10px;
background:#00ff88;
border:none;
font-weight:bold;
}

.phone{
width:230px;
height:420px;
background:white;
border:6px solid #444;
border-radius:20px;
position:relative;
overflow:hidden;
}

.element{
position:absolute;
cursor:move;
}

</style>
</head>

<body>

<h2>Advanced Mobile App Builder</h2>

<div class="container">

<div class="panel">

<h4>Components</h4>

<button onclick="addButton()">Button</button>
<button onclick="addText()">Text</button>
<button onclick="addImage()">Image</button>
<button onclick="clearScreen()">Clear</button>
<button onclick="downloadApp()">Export</button>

</div>

<div class="phone" id="screen"></div>

</div>

<script>

function makeDraggable(el){

let offsetX, offsetY;

el.addEventListener("touchstart",function(e){

offsetX=e.touches[0].clientX-el.offsetLeft;
offsetY=e.touches[0].clientY-el.offsetTop;

document.ontouchmove=function(e){

el.style.left=(e.touches[0].clientX-offsetX)+"px";
el.style.top=(e.touches[0].clientY-offsetY)+"px";

};

});

document.ontouchend=function(){
document.ontouchmove=null;
};

}

function addButton(){

let btn=document.createElement("button");
btn.innerText="Button";
btn.className="element";
btn.style.left="20px";
btn.style.top="20px";

makeDraggable(btn);

document.getElementById("screen").appendChild(btn);

}

function addText(){

let txt=document.createElement("div");
txt.innerText="Text";
txt.className="element";
txt.style.left="20px";
txt.style.top="60px";
txt.style.color="black";

makeDraggable(txt);

document.getElementById("screen").appendChild(txt);

}

function addImage(){

let img=document.createElement("img");
img.src="https://via.placeholder.com/80";
img.className="element";
img.style.left="20px";
img.style.top="100px";

makeDraggable(img);

document.getElementById("screen").appendChild(img);

}

function clearScreen(){
document.getElementById("screen").innerHTML="";
}

function downloadApp(){

let html=document.getElementById("screen").innerHTML;

let file=`<!DOCTYPE html>
<html>
<body>
${html}
</body>
</html>`;

let blob=new Blob([file],{type:"text/html"});
let a=document.createElement("a");

a.href=URL.createObjectURL(blob);
a.download="app.html";

a.click();

}

</script>

</body>
</html>
