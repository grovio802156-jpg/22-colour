<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>App Builder</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">APP BUILDER</div>

<div class="menu">

<button onclick="newProject()">New Project</button>
<button onclick="saveProject()">Save</button>
<button onclick="dragDrop()">Drag & Drop</button>
<button onclick="exportProject()">Export</button>
<button onclick="settings()">Settings</button>

</div>

</header>

<div class="main">

<div class="errors">

<h3>Code Errors</h3>

<div id="errorBox"></div>

</div>

<div class="editor">

<textarea id="codeArea" oninput="updatePreview()"></textarea>

</div>

<div class="selector">

<button onclick="setMode('html')" class="html">HTML</button>
<button onclick="setMode('css')" class="css">CSS</button>
<button onclick="setMode('js')" class="js">JS</button>

</div>

</div>

<div class="preview">

<h3>Live App Result</h3>

<iframe id="result"></iframe>

</div>

<script src="script.js"></script>

</body>
</html>}

function downloadApp(){

let html=document.getElementById("screen").innerHTML;

let file=`<!DOCTYPE html>
<html>
<body>
${html}
</body>
</html>`;

let blob=new Blob([file],{type:"text/html"});
let a=document.createElement("a");

a.href=URL.createObjectURL(blob);
a.download="app.html";

a.click();

}

</script>

</body>
</html>
