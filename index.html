<!DOCTYPE html>
<html>
<head>

<title>22 Colour</title>

<script src="script.js"></script>
</head>

<body>

<div class="header">

<div class="logo">

<div class="download">
⬇

</div>

<div class="banner">

</div>

<!-- BOTTOM MENU -->

<div class="bottom">

<div onclick="home()">
🏠

</div>

<div onclick="activity()">
📊

</div>
